    <div class="container">
      <a href="jogos.html" class="btn back-btn">Voltar</a>
      <section class="crossword-layout" aria-labelledby="crossword-title">
        <div class="card crossword-info">
          <h1 id="crossword-title">Palavras Cruzadas Cognitivas</h1>
          <p>Leia as pistas e complete as palavras com calma.</p>
          <div class="crossword-actions" aria-label="Controles do jogo">

          <h2>Pistas horizontais</h2>
          <ol class="crossword-clues" id="across-clues"></ol>
          <h2>Pistas verticais</h2>
          <ol class="crossword-clues" id="down-clues"></ol>
